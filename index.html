<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AFC'34 JO10-2</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --blauw:#0A1F5C;--blauw2:#1A3A8A;--blauw3:#2B52CC;
  --geel:#FFD700;--geel2:#FFF3CD;
  --groen:#E8F5E9;--groen2:#2e7d32;
  --wit:#fff;--grijs:#F0F2F8;--grijs2:#DDE3EE;
  --tekst:#0D1B3E;--muted:#6b7a99;
  --r:12px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Barlow',sans-serif;background:var(--grijs);min-height:100vh;color:var(--tekst);}

/* Header */
.hdr{background:var(--blauw);display:flex;align-items:center;gap:12px;padding:0 16px;height:56px;border-bottom:3px solid var(--geel);position:sticky;top:0;z-index:20;}
.hdr-logo{width:32px;height:32px;background:var(--geel);border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:10px;color:var(--blauw);line-height:1.1;text-align:center;flex-shrink:0;}
.hdr-titel{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:17px;color:var(--geel);}
.hdr-refresh{margin-left:auto;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:rgba(255,255,255,0.7);padding:5px 11px;border-radius:6px;font-size:12px;cursor:pointer;white-space:nowrap;}

/* Pagina's */
.pagina{max-width:600px;margin:0 auto;padding:12px;}

/* Lege staat */
.leeg{text-align:center;padding:60px 20px;color:var(--muted);}
.leeg-icon{font-size:44px;margin-bottom:12px;opacity:0.35;display:block;}

/* ── Overzicht kaarten ── */
.wed-kaart{background:var(--wit);border-radius:var(--r);border:1px solid var(--grijs2);margin-bottom:10px;overflow:hidden;cursor:pointer;-webkit-tap-highlight-color:transparent;}
.wed-kaart:active{opacity:0.85;}

.wed-kaart-hdr{background:var(--blauw);padding:12px 14px;display:flex;align-items:flex-start;justify-content:space-between;gap:8px;}
.wed-kaart-links{flex:1;min-width:0;}
.wed-badge-rij{display:flex;align-items:center;gap:7px;margin-bottom:5px;flex-wrap:wrap;}
.soort-pill{font-size:10px;font-weight:700;padding:2px 9px;border-radius:20px;text-transform:uppercase;letter-spacing:0.4px;white-space:nowrap;}
.sp-thuis{background:rgba(255,255,255,0.15);color:rgba(255,255,255,0.9);}
.sp-uit{background:rgba(59,139,212,0.3);color:#90caf9;}
.sp-toernooi{background:rgba(255,215,0,0.2);color:var(--geel);}
.kaart-score{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:800;color:var(--geel);}
.wed-kaart-vs{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:800;color:#fff;line-height:1.2;word-break:break-word;}
.wed-kaart-meta{font-size:11px;color:rgba(255,255,255,0.5);margin-top:3px;}

.wed-kaart-body{padding:10px 14px;}
.scorer-rij{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:7px;}
.scorer-chip{background:var(--groen);color:var(--groen2);font-size:12px;font-weight:600;padding:3px 10px;border-radius:20px;font-family:'Barlow Condensed',sans-serif;}
.detail-link{font-size:11px;font-weight:600;color:var(--blauw3);}

/* ── Detail pagina ── */
.terug{display:inline-flex;align-items:center;gap:6px;padding:7px 13px;background:var(--wit);border:1.5px solid var(--grijs2);border-radius:8px;font-size:13px;font-weight:600;color:var(--blauw2);cursor:pointer;margin-bottom:12px;}

.det-hdr{background:var(--blauw);border-radius:var(--r);padding:14px;margin-bottom:10px;}
.det-badge-rij{display:flex;align-items:center;gap:8px;margin-bottom:7px;}
.det-vs{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:800;color:#fff;margin-bottom:3px;word-break:break-word;}
.det-meta{font-size:11px;color:rgba(255,255,255,0.5);}

.scorebord{display:flex;align-items:center;background:rgba(255,255,255,0.1);border-radius:10px;padding:12px 14px;margin-top:10px;}
.sb-team{flex:1;text-align:center;}
.sb-naam{font-size:10px;font-weight:600;color:rgba(255,255,255,0.55);text-transform:uppercase;letter-spacing:0.4px;margin-bottom:4px;}
.sb-getal{font-family:'Barlow Condensed',sans-serif;font-size:40px;font-weight:800;color:var(--geel);line-height:1;}
.sb-sep{width:2px;height:48px;background:rgba(255,255,255,0.15);}

.det-card{background:var(--wit);border-radius:var(--r);border:1px solid var(--grijs2);padding:12px 14px;margin-bottom:10px;}
.det-card-titel{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:12px;color:var(--blauw);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:10px;padding-bottom:7px;border-bottom:2px solid var(--geel);}

.scorers{display:flex;flex-wrap:wrap;gap:6px;}
.scorer-tag{display:flex;align-items:center;gap:5px;background:var(--groen);color:var(--groen2);font-size:13px;font-weight:600;padding:5px 11px;border-radius:20px;font-family:'Barlow Condensed',sans-serif;}

/* Opstelling — volledig scrollbaar op mobiel */
.h-lbl{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:11px;color:var(--geel);background:var(--blauw);padding:5px 10px;border-radius:6px 6px 0 0;letter-spacing:1px;display:block;}
.opr-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:0 0 6px 6px;border:1px solid var(--grijs2);border-top:none;}
.opr-tbl{width:100%;border-collapse:collapse;font-size:11px;}
.opr-tbl th{background:var(--blauw);color:var(--geel);font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;padding:5px 6px;text-align:center;white-space:nowrap;}
.opr-tbl th.rh{background:var(--blauw2);text-align:left;min-width:52px;}
.opr-tbl td{padding:5px 6px;text-align:center;border:1px solid var(--grijs2);font-weight:500;font-size:11px;white-space:nowrap;}
.opr-tbl td.rl{background:var(--blauw);color:var(--geel);font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:700;text-align:left;padding-left:6px;white-space:nowrap;}
.ck{background:#1A3A8A;color:#fff;font-weight:700;}
.cv{background:#E8F5E9;color:#1b5e20;}
.cb{background:#FFF3CD;color:#7A5800;}
.cs{background:#C8D8F0;height:4px;padding:0!important;}
/* Op mobiel: helften onder elkaar */
.opr-grid{display:grid;grid-template-columns:1fr;gap:10px;}
@media(min-width:600px){.opr-grid{grid-template-columns:1fr 1fr;}}
.bank-bar{background:var(--grijs);border-radius:7px;padding:7px 10px;font-size:11px;color:var(--muted);margin-top:8px;}
</style>
</head>
<body>
<div class="hdr">
  <div class="hdr-logo" onclick="naarHome()" style="cursor:pointer">AFC<br>34</div>
  <div class="hdr-titel">AFC'34 JO10-2</div>
  <button class="hdr-refresh" onclick="handmatigVernieuwen()">↻ Vernieuwen</button>
</div>

<div class="pagina">
  <div id="overzicht"></div>
  <div id="detail" style="display:none"></div>
</div>

<script>
let alles = [];
let actiefId = null; // sla alleen ID op, niet het object

function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function fmt(sec){return String(Math.floor(sec/60)).padStart(2,'0')+':'+String(sec%60).padStart(2,'0');}
function datumLang(d){
  if(!d)return'';
  const mn=['jan','feb','mrt','apr','mei','jun','jul','aug','sep','okt','nov','dec'];
  const[y,m,g]=d.split('-');return parseInt(g)+' '+mn[parseInt(m)-1]+' '+y;
}
function soortPill(s){
  if(s==='uit')return'<span class="soort-pill sp-uit">🚌 Uit</span>';
  if(s==='toernooi')return'<span class="soort-pill sp-toernooi">🏆 Toernooi</span>';
  return'<span class="soort-pill sp-thuis">🏠 Thuis</span>';
}
function scorers(w){
  if(!w.doelpunten)return[];
  return Object.entries(w.doelpunten).filter(([,v])=>v>0).sort(([,a],[,b])=>b-a);
}
function naarHome(){
  actiefId=null;
  renderOverzicht();
  window.scrollTo({top:0,behavior:'smooth'});
}

function renderOverzicht(){
  document.getElementById('detail').style.display='none';
  const el=document.getElementById('overzicht');
  el.style.display='';
  // Filter en sorteer alle gepubliceerde wedstrijden
  const pub=alles.filter(w=>w.gepubliceerd===true).sort((a,b)=>new Date(b.datum)-new Date(a.datum));
  if(!pub.length){
    el.innerHTML='<div class="leeg"><span class="leeg-icon">⚽</span>Nog geen wedstrijden gepubliceerd.<br>Kom later terug!</div>';
    return;
  }
  el.innerHTML=pub.map(w=>{
    const heeftScore=w.uitslag&&(w.uitslag.thuis>0||w.uitslag.uit>0);
    const sc=scorers(w);
    const tijd=w.tijdstip?' · '+w.tijdstip:'';
    const wid=String(w.id);
    return`<div class="wed-kaart" onclick="toonDetail('${wid}')">
      <div class="wed-kaart-hdr">
        <div class="wed-kaart-links">
          <div class="wed-badge-rij">
            ${soortPill(w.soort||'thuis')}
            ${heeftScore?'<span class="kaart-score">'+w.uitslag.thuis+' – '+w.uitslag.uit+'</span>':''}
          </div>
          <div class="wed-kaart-vs">AFC'34 JO10-2 vs ${esc(w.tegenstander)}</div>
          <div class="wed-kaart-meta">${datumLang(w.datum)}${tijd}</div>
        </div>
        <div style="color:rgba(255,255,255,0.35);font-size:20px;align-self:center;flex-shrink:0">›</div>
      </div>
      ${sc.length||w.opstelling?`<div class="wed-kaart-body">
        ${sc.length?'<div class="scorer-rij">'+sc.map(([s,v])=>'<span class="scorer-chip">'+'⚽'.repeat(v)+' '+esc(s)+'</span>').join('')+'</div>':''}
        ${w.opstelling?'<div class="detail-link">📋 Opstelling beschikbaar › bekijk details</div>':''}
      </div>`:''}
    </div>`;
  }).join('');
}

function toonDetail(wid){
  actiefId=wid;
  const w=alles.find(w=>String(w.id)===wid);
  if(!w)return;
  document.getElementById('overzicht').style.display='none';
  const el=document.getElementById('detail');
  el.style.display='';
  el.innerHTML=renderDetail(w);
  window.scrollTo({top:0,behavior:'smooth'});
}

function renderDetail(w){
  const sc=scorers(w);
  const heeftScore=w.uitslag&&(w.uitslag.thuis>0||w.uitslag.uit>0);
  const tijd=w.tijdstip?' · '+w.tijdstip:'';
  const heeftOpr=!!(w.opstelling&&w.opstelling.periodes);

  let h=`<button class="terug" onclick="naarHome()">← Alle wedstrijden</button>
  <div class="det-hdr">
    <div class="det-badge-rij">${soortPill(w.soort||'thuis')}</div>
    <div class="det-vs">AFC'34 JO10-2 vs ${esc(w.tegenstander)}</div>
    <div class="det-meta">${datumLang(w.datum)}${tijd}</div>
    ${heeftScore?`<div class="scorebord">
      <div class="sb-team"><div class="sb-naam">AFC'34 JO10-2</div><div class="sb-getal">${w.uitslag.thuis}</div></div>
      <div class="sb-sep"></div>
      <div class="sb-team"><div class="sb-naam">${esc(w.tegenstander)}</div><div class="sb-getal">${w.uitslag.uit}</div></div>
    </div>`:''}
  </div>`;

  if(sc.length){
    h+=`<div class="det-card"><div class="det-card-titel">⚽ Doelpunten AFC'34</div>
    <div class="scorers">${sc.map(([s,v])=>`<span class="scorer-tag"><span>${'⚽'.repeat(v)}</span> ${esc(s)}</span>`).join('')}</div></div>`;
  }

  if(heeftOpr){
    const per=w.opstelling.periodes;
    const nB=Math.max(...per.map(p=>p.bank.length),0);
    const rijen=['KEEPER',...Array.from({length:5},(_,i)=>'SPELER '+(i+1)),'SEP',...Array.from({length:nB},(_,i)=>'BANK '+(i+1))];

    function tabel(offset,lbl){
      const cols=per.slice(offset,offset+4);
      let t=`<div class="h-lbl">${lbl}</div><div class="opr-scroll"><table class="opr-tbl"><tr><th class="rh">Rol</th>`;
      for(let i=0;i<4;i++){const s=(offset+i)*375;t+=`<th>P${offset+i+1}<br><small style="font-weight:400;opacity:0.8">${fmt(s)}–${fmt(s+375)}</small></th>`;}
      t+='</tr>';
      rijen.forEach((r,ri)=>{
        if(r==='SEP'){t+='<tr><td class="rl cs" colspan="5"></td></tr>';return;}
        t+=`<tr><td class="rl">${r}</td>`;
        cols.forEach(p=>{
          let n='',c='';
          if(ri===0){n=p.keeper;c='ck';}
          else if(ri<=5){n=p.veld[ri-1]||'';c='cv';}
          else{n=p.bank[ri-7]||'';c='cb';}
          t+=`<td class="${c}">${n?n.toUpperCase():''}</td>`;
        });
        t+='</tr>';
      });
      return t+'</table></div>';
    }

    const bt={};(w.opstelling.aanwezig||[]).forEach(s=>bt[s]=0);
    per.forEach(p=>p.bank.forEach(s=>{if(bt[s]!==undefined)bt[s]++;}));
    const bs=Object.entries(bt).filter(([,v])=>v>0).map(([s,v])=>`<strong>${s}</strong> ${v}×`).join(' · ');

    h+=`<div class="det-card"><div class="det-card-titel">📋 Opstelling</div>
    <div class="opr-grid"><div>${tabel(0,'HELFT 1 · 00:00–25:00')}</div><div>${tabel(4,'HELFT 2 · 25:00–50:00')}</div></div>
    <div class="bank-bar">🪑 ${bs}</div></div>`;
  }
  return h;
}

async function fetchData(){
  const r=await fetch('data.json?t='+Date.now());
  if(!r.ok)throw new Error('HTTP '+r.status);
  return r.json();
}

async function handmatigVernieuwen(){
  try{
    alles=await fetchData();
    if(actiefId){
      const w=alles.find(w=>String(w.id)===actiefId);
      if(w){document.getElementById('detail').innerHTML=renderDetail(w);return;}
    }
    renderOverzicht();
  }catch(e){console.error(e);}
}

async function achtergrondVernieuwen(){
  // Vernieuw data zonder loader te tonen en zonder view te wisselen
  try{
    const nieuw=await fetchData();
    alles=nieuw;
    if(actiefId){
      // Alleen de detail-inhoud bijwerken als die zichtbaar is
      const w=alles.find(w=>String(w.id)===actiefId);
      if(w&&document.getElementById('detail').style.display!=='none'){
        document.getElementById('detail').innerHTML=renderDetail(w);
        return;
      }
    }
    // Overzicht stilletjes herbouwen (geen loader, geen scroll)
    if(document.getElementById('overzicht').style.display!=='none'){
      renderOverzicht();
    }
  }catch(e){console.error(e);}
}

// Initieel laden met loader
(async()=>{
  document.getElementById('overzicht').innerHTML='<div class="leeg"><span class="leeg-icon">⏳</span>Laden...</div>';
  try{alles=await fetchData();}catch(e){}
  renderOverzicht();
})();

// Achtergrond refresh elke 30s — verstoort NOOIT de huidige view
setInterval(achtergrondVernieuwen,30000);
</script>
</body>
</html>
